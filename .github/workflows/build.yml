name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.target || 'native' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows (with auto-elevation)
          - os: windows-latest
            platform: windows
            target: x86_64-pc-windows-msvc
            artifact: hostly-windows-x64
          # macOS Apple Silicon
          - os: macos-latest
            platform: macos
            target: aarch64-apple-darwin
            artifact: hostly-macos-arm64
          # macOS Intel
          - os: macos-latest
            platform: macos
            target: x86_64-apple-darwin
            artifact: hostly-macos-x64
          # Linux
          - os: ubuntu-22.04
            platform: linux
            target: x86_64-unknown-linux-gnu
            artifact: hostly-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm deps
        run: npm ci || npm install

      # ============== BUILD ==============
      - name: Build Tauri (Windows)
        if: runner.os == 'Windows'
        run: npm run tauri build

      - name: Build Tauri (macOS)
        if: runner.os == 'macOS'
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Build Tauri (Linux)
        if: runner.os == 'Linux'
        run: npm run tauri build

      # ============== STAGE ARTIFACTS ==============
      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item src-tauri/target/release/hostly.exe -Destination artifacts/hostly-gui-elevated-${{ matrix.target }}.exe
          Copy-Item src-tauri/target/release/hostly-cli-elevated.exe -Destination artifacts/hostly-cli-elevated-${{ matrix.target }}.exe
          Copy-Item src-tauri/target/release/hostly-core.exe -Destination artifacts/hostly-core-${{ matrix.target }}.exe
          # Pull in both MSI and NSIS installers from the bundle output
          Get-ChildItem src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in '.msi' -or $_.Name -like '*-setup.exe' } |
            Copy-Item -Destination artifacts/

      - name: Stage artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          cp -R src-tauri/target/${{ matrix.target }}/release/bundle/macos/Hostly.app artifacts/ || true
          cp src-tauri/target/${{ matrix.target }}/release/hostly-core artifacts/hostly-core || true
          find src-tauri/target/${{ matrix.target }}/release/bundle -name '*.dmg' -exec cp {} artifacts/ \; 2>/dev/null || true

      - name: Stage artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/release/hostly artifacts/hostly-bin || true
          cp src-tauri/target/release/hostly-core artifacts/hostly-core || true
          find src-tauri/target/release/bundle -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' |
            xargs -I {} cp {} artifacts/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/**
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes for this version
        id: notes
        run: |
          # 把 tag 里的 v 前缀去掉,比如 v1.1.0 -> 1.1.0
          VERSION="${GITHUB_REF_NAME#v}"
          # 从 CHANGELOG.md 抽取 [VERSION] 那段,直到下一个 ## [
          awk -v ver="$VERSION" '
            BEGIN { in_section=0; print_first=0 }
            /^## \[/ {
              if (in_section) exit
              if (index($0, "[" ver "]") > 0) { in_section=1; print_first=1 }
            }
            print_first { print; if (NR > 1 && /^## /) print_first=0 }
          ' CHANGELOG.md > release_notes.md
          echo "--- release_notes.md ---"
          cat release_notes.md
          echo "--- end ---"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Hostly ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
