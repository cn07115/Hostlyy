name: Build

on:
  # 只在 push tag 时跑 CI(发版才需要 build + release)
  # 日常 push main 不再触发,避免 push main + push tag 跑 2 次
  # PR 仍走 pull_request 验证,workflow_dispatch 保留手动触发
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN 默认 read-only,创建 release 需要显式申请写权限
permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.target || 'native' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows (with auto-elevation)
          - os: windows-latest
            platform: windows
            target: x86_64-pc-windows-msvc
            artifact: hostly-windows-x64
          # macOS Apple Silicon
          - os: macos-latest
            platform: macos
            target: aarch64-apple-darwin
            artifact: hostly-macos-arm64
          # macOS Intel
          - os: macos-latest
            platform: macos
            target: x86_64-apple-darwin
            artifact: hostly-macos-x64
          # Linux
          - os: ubuntu-22.04
            platform: linux
            target: x86_64-unknown-linux-gnu
            artifact: hostly-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm deps
        run: npm ci || npm install

      # ============== BUILD ==============
      - name: Build Tauri (Windows)
        if: runner.os == 'Windows'
        run: npm run tauri build

      - name: Build Tauri (macOS)
        if: runner.os == 'macOS'
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Build Tauri (Linux)
        if: runner.os == 'Linux'
        run: npm run tauri build

      # ============== STAGE ARTIFACTS ==============
      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          # 拉 NSIS installer + MSI installer (这俩是用户真正要下载的,
          # raw 编译产物 hostly.exe / hostly-cli-elevated.exe / hostly-core.exe
          # 都已经打包进 NSIS installer 里了,不再单独 stage)
          Get-ChildItem src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in '.msi' -or $_.Name -like '*-setup.exe' } |
            Copy-Item -Destination artifacts/

      - name: Stage artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          # 不写死 target/<triple>/release/bundle/macos/Hostlyy.app 路径——
          # Tauri 2 在 macos-latest M1 runner 上 + --target aarch64-apple-darwin 时
          # 实际产物可能在 target/<triple>/ 或 target/ (host==target) 任一路径,
          # 用 find 鲁棒匹配所有可能的 layout
          find src-tauri/target -name 'Hostlyy.app' -type d -exec cp -R {} artifacts/ \; 2>/dev/null || true
          find src-tauri/target -name '*.dmg' -exec cp {} artifacts/ \; 2>/dev/null || true
          # 调试:把实际拷贝结果打出来,CI log 可见
          echo "--- artifacts/ after stage ---"
          ls -la artifacts/ || true
          echo "--- Hostlyy.app inside artifacts ---"
          find artifacts -name 'Hostlyy.app' -type d -print || true

      - name: Stage artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          find src-tauri/target/release/bundle -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' |
            xargs -I {} cp {} artifacts/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/**
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes for this version
        id: notes
        run: |
          # 把 tag 里的 v 前缀去掉,比如 v1.1.0 -> 1.1.0
          VERSION="${GITHUB_REF_NAME#v}"
          # 从 CHANGELOG.md 抽取 [VERSION] 这一段,直到下一个 ## [
          # 第一个 sed 抓范围,第二个 sed 删掉最后一行(下一段的起始)
          sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d' > release_notes.md
          echo "--- release_notes.md ---"
          cat release_notes.md
          echo "--- end ---"

      # ============== SIGN ARTIFACTS (Tauri updater) ==============
      # 给自动更新用:对平台安装包签名,生成 latest.json(包含签名 + 平台 URL)。
      # 客户端启动时拉取 latest.json,验证签名后下载新版本。
      # 需要在 GH 仓库 secrets 里配:
      #   TAURI_SIGNING_PRIVATE_KEY       (key 文件内容,base64)
      #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD
      # 没配也没关系,softprops 仍会发版,只是客户端检测不到更新。
      - name: Setup Node (for tauri CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Tar macOS .app bundles for updater
        run: |
          set -x
          # 调试:打印 artifacts/ 实际目录结构,方便定位 Hostlyy.app 真实位置
          echo "--- artifacts/ tree ---"
          find artifacts -maxdepth 3 -type d -print
          echo "--- Hostlyy.app candidates ---"
          find artifacts -name 'Hostlyy.app' -type d -print
          # 用 find 找所有 Hostlyy.app 目录,逐个打成 .tar.gz(不写死路径,鲁棒匹配各种 CI 布局)
          find artifacts -name 'Hostlyy.app' -type d | while read -r app; do
            tar -czf "${app}.tar.gz" -C "$(dirname "$app")" "$(basename "$app")"
          done
          echo "--- produced tar.gz ---"
          find artifacts -name 'Hostlyy.app.tar.gz' -print

      - name: Sign installers
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -e
          # 定位每个平台的安装包(Hostlyy 带 y 是产品名;版本号在文件名里,需要通配)
          WIN_EXE=$(find artifacts -name 'Hostlyy_*_x64-setup.exe' | head -1)
          MAC_ARM_TGZ=$(find artifacts -path '*macos-arm64*' -name 'Hostlyy.app.tar.gz' | head -1)
          MAC_X64_TGZ=$(find artifacts -path '*macos-x64*' -name 'Hostlyy.app.tar.gz' | head -1)
          LINUX_APPIMAGE=$(find artifacts -name 'Hostlyy_*_amd64.AppImage' | head -1)
          echo "Windows: $WIN_EXE"
          echo "macOS arm64: $MAC_ARM_TGZ"
          echo "macOS x64: $MAC_X64_TGZ"
          echo "Linux: $LINUX_APPIMAGE"
          # tauri-cli 2.11.x 的 signer sign 命令一次只接受 1 个文件位置参数(2.11.2 报错
          # 验证过);所以循环逐个 sign。只对能 updater 下载的文件签名
          # (setup.exe / .app.tar.gz / AppImage),msi/dmg/deb/rpm 不签
          # pin tauri cli 2.11.0 锁版本,防止 2.11.x patch 升级再改行为
          FILES=()
          [ -n "$WIN_EXE" ]       && FILES+=("$WIN_EXE")
          [ -n "$MAC_ARM_TGZ" ]   && FILES+=("$MAC_ARM_TGZ")
          [ -n "$MAC_X64_TGZ" ]   && FILES+=("$MAC_X64_TGZ")
          [ -n "$LINUX_APPIMAGE" ] && FILES+=("$LINUX_APPIMAGE")
          for f in "${FILES[@]}"; do
            echo "  signing: $f"
            npx @tauri-apps/cli@2.11.0 signer sign "$f"
          done
          # signer sign 在 <file>.sig 写 base64 signature;统一收集到 artifacts/signatures/
          # 方便下一步 Generate latest.json 引用
          mkdir -p artifacts/signatures
          find artifacts -name '*.sig' -exec cp -f {} artifacts/signatures/ \;
          echo "--- generated signatures ---"
          ls -la artifacts/signatures/ || true

      # signer sign 不产 latest.json(它只产 .sig);这里手动拼 latest.json,
      # 收集所有 .sig + 对应 installer,生成 Tauri updater 需要的 manifest
      - name: Generate latest.json
        env:
          GITHUB_REPO: cn07115/Hostlyy
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BASE_URL="https://github.com/${GITHUB_REPO}/releases/download/${GITHUB_REF_NAME}"

          # 平台键:windows-x86_64 / darwin-aarch64 / darwin-x86_64 / linux-x86_64 (Tauri 2 标准)
          PLATFORMS='{}'

          add_platform() {
            local key="$1" file="$2"
            [ -z "$file" ] && return
            local sigfile="${file}.sig"
            [ ! -f "$sigfile" ] && { echo "  skip $key: no signature at $sigfile"; return; }
            local sig
            sig=$(cat "$sigfile")
            local fname
            fname=$(basename "$file")
            local url="${BASE_URL}/${fname}"
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "$url" --arg sig "$sig" --arg k "$key" '. + {($k): {signature: $sig, url: $url}}')
            echo "  + $key -> $fname"
          }

          WIN_EXE=$(find artifacts -name 'Hostlyy_*_x64-setup.exe' | head -1)
          MAC_ARM_TGZ=$(find artifacts -path '*macos-arm64*' -name 'Hostlyy.app.tar.gz' | head -1)
          MAC_X64_TGZ=$(find artifacts -path '*macos-x64*' -name 'Hostlyy.app.tar.gz' | head -1)
          LINUX_APPIMAGE=$(find artifacts -name 'Hostlyy_*_amd64.AppImage' | head -1)

          add_platform "windows-x86_64"  "$WIN_EXE"
          add_platform "darwin-aarch64"  "$MAC_ARM_TGZ"
          add_platform "darwin-x86_64"   "$MAC_X64_TGZ"
          add_platform "linux-x86_64"    "$LINUX_APPIMAGE"

          # 拼 latest.json(notes 由下个 step 注入)
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, pub_date: $pub_date, platforms: $platforms}' > artifacts/latest.json
          echo "--- generated latest.json (without notes) ---"
          cat artifacts/latest.json

      # signer sign 不填 notes 字段,这里把 release_notes.md 注入到 latest.json
      # 这样客户端 updater.check() 拿到的 update.notes 就有内容,能显示更新日志
      - name: Inject release notes into latest.json
        if: always() && hashFiles('release_notes.md') != ''
        run: |
          LJ="artifacts/latest.json"
          if [ ! -f "$LJ" ]; then
            echo "no latest.json found, skipping notes injection"
            exit 0
          fi
          echo "Patching: $LJ"
          NOTES=$(jq -Rs . < release_notes.md)
          jq --argjson notes "$NOTES" '.notes = $notes' "$LJ" > "$LJ.tmp"
          mv "$LJ.tmp" "$LJ"
          echo "--- patched latest.json ---"
          cat "$LJ"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Hostlyy ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
            artifacts/**/*.sig
            artifacts/**/latest.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
