name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN 默认 read-only,创建 release 需要显式申请写权限
permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.target || 'native' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows (with auto-elevation)
          - os: windows-latest
            platform: windows
            target: x86_64-pc-windows-msvc
            artifact: hostly-windows-x64
          # macOS Apple Silicon
          - os: macos-latest
            platform: macos
            target: aarch64-apple-darwin
            artifact: hostly-macos-arm64
          # macOS Intel
          - os: macos-latest
            platform: macos
            target: x86_64-apple-darwin
            artifact: hostly-macos-x64
          # Linux
          - os: ubuntu-22.04
            platform: linux
            target: x86_64-unknown-linux-gnu
            artifact: hostly-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm deps
        run: npm ci || npm install

      # ============== BUILD ==============
      - name: Build Tauri (Windows)
        if: runner.os == 'Windows'
        run: npm run tauri build

      - name: Build Tauri (macOS)
        if: runner.os == 'macOS'
        run: npm run tauri build -- --target ${{ matrix.target }}

      - name: Build Tauri (Linux)
        if: runner.os == 'Linux'
        run: npm run tauri build

      # ============== STAGE ARTIFACTS ==============
      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item src-tauri/target/release/hostly.exe -Destination artifacts/hostly-gui-elevated-${{ matrix.target }}.exe
          Copy-Item src-tauri/target/release/hostly-cli-elevated.exe -Destination artifacts/hostly-cli-elevated-${{ matrix.target }}.exe
          Copy-Item src-tauri/target/release/hostly-core.exe -Destination artifacts/hostly-core-${{ matrix.target }}.exe
          # Pull in both MSI and NSIS installers from the bundle output
          Get-ChildItem src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in '.msi' -or $_.Name -like '*-setup.exe' } |
            Copy-Item -Destination artifacts/

      - name: Stage artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          cp -R src-tauri/target/${{ matrix.target }}/release/bundle/macos/Hostly.app artifacts/ || true
          cp src-tauri/target/${{ matrix.target }}/release/hostly-core artifacts/hostly-core || true
          find src-tauri/target/${{ matrix.target }}/release/bundle -name '*.dmg' -exec cp {} artifacts/ \; 2>/dev/null || true

      - name: Stage artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/release/hostly artifacts/hostly-bin || true
          cp src-tauri/target/release/hostly-core artifacts/hostly-core || true
          find src-tauri/target/release/bundle -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' |
            xargs -I {} cp {} artifacts/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/**
          if-no-files-found: warn
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes for this version
        id: notes
        run: |
          # 把 tag 里的 v 前缀去掉,比如 v1.1.0 -> 1.1.0
          VERSION="${GITHUB_REF_NAME#v}"
          # 从 CHANGELOG.md 抽取 [VERSION] 这一段,直到下一个 ## [
          # 第一个 sed 抓范围,第二个 sed 删掉最后一行(下一段的起始)
          sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | sed '$d' > release_notes.md
          echo "--- release_notes.md ---"
          cat release_notes.md
          echo "--- end ---"

      # ============== SIGN ARTIFACTS (Tauri updater) ==============
      # 给自动更新用:对平台安装包签名,生成 latest.json(包含签名 + 平台 URL)。
      # 客户端启动时拉取 latest.json,验证签名后下载新版本。
      # 需要在 GH 仓库 secrets 里配:
      #   TAURI_SIGNING_PRIVATE_KEY       (key 文件内容,base64)
      #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD
      # 没配也没关系,softprops 仍会发版,只是客户端检测不到更新。
      - name: Setup Node (for tauri CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Tar macOS .app bundles for updater
        run: |
          for app in artifacts/**/Hostly.app; do
            [ -d "$app" ] || continue
            tar -czf "${app}.tar.gz" -C "$(dirname "$app")" "$(basename "$app")"
          done
          find artifacts -name 'Hostly.app.tar.gz' -print

      - name: Sign installers and generate latest.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -e
          # 定位每个平台的安装包(版本号在文件名里,需要通配)
          WIN_EXE=$(find artifacts -name 'Hostly_*_x64-setup.exe' | head -1)
          MAC_ARM_TGZ=$(find artifacts -path '*macos-arm64*' -name 'Hostly.app.tar.gz' | head -1)
          MAC_X64_TGZ=$(find artifacts -path '*macos-x64*' -name 'Hostly.app.tar.gz' | head -1)
          LINUX_APPIMAGE=$(find artifacts -name '*.AppImage' | head -1)
          echo "Windows: $WIN_EXE"
          echo "macOS arm64: $MAC_ARM_TGZ"
          echo "macOS x64: $MAC_X64_TGZ"
          echo "Linux: $LINUX_APPIMAGE"
          # 拼 base URL:所有 artifact 共享 GitHub release 的下载前缀
          BASE="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          ARGS=()
          [ -n "$WIN_EXE" ]      && ARGS+=(-b "$BASE/$(basename "$WIN_EXE")")
          [ -n "$MAC_ARM_TGZ" ]  && ARGS+=(-b "$BASE/$(basename "$MAC_ARM_TGZ")")
          [ -n "$MAC_X64_TGZ" ]  && ARGS+=(-b "$BASE/$(basename "$MAC_X64_TGZ")")
          [ -n "$LINUX_APPIMAGE" ] && ARGS+=(-b "$BASE/$(basename "$LINUX_APPIMAGE")")
          npx @tauri-apps/cli signer sign "${ARGS[@]}"

      # signer sign 不填 notes 字段,这里把 release_notes.md 注入到 latest.json
      # 这样客户端 updater.check() 拿到的 update.notes 就有内容,能显示更新日志
      - name: Inject release notes into latest.json
        if: always() && hashFiles('release_notes.md') != ''
        run: |
          # 找到 latest.json(signer sign 默认写在当前目录,但我们 cwd 是 repo 根)
          LJ=$(find artifacts -name 'latest.json' | head -1)
          if [ -z "$LJ" ]; then
            echo "no latest.json found, skipping notes injection"
            exit 0
          fi
          echo "Patching: $LJ"
          # 用 jq 把 release_notes.md 作为 JSON 字符串塞到 notes 字段
          NOTES=$(jq -Rs . < release_notes.md)
          jq --argjson notes "$NOTES" '.notes = $notes' "$LJ" > "$LJ.tmp"
          mv "$LJ.tmp" "$LJ"
          echo "--- patched latest.json ---"
          cat "$LJ"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Hostlyy ${{ github.ref_name }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
            artifacts/**/*.sig
            artifacts/**/latest.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
